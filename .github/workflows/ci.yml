name: CI

# Manual only. Previously triggered on push / PR to main — flipped to
# workflow_dispatch so runs are intentional, not byproducts of every
# push. Re-add the push / pull_request triggers here when the main
# branch stabilizes and you want continuous checks again.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    # v0.1 runtime is macOS-only, but we compile on linux to catch
    # portability regressions early. Tests that rely on macOS-specific
    # behavior should be tagged accordingly.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt needs to be run on:"
            echo "$out"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build ./...
